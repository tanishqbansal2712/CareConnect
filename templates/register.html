<!DOCTYPE html>
<html>
<head>
<title>Patient Registration</title>

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/static/css/style.css">

<style>
body{
  background:#f5f7fa;
}

.card-box{
  max-width:900px;
  width:100%;
  margin:50px auto;
  padding:40px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.title{
  color:#0d6efd;
  font-weight:bold;
}

.btn-green{
  background:#198754;
  color:white;
}
</style>

</head>

<body>

<div id="app" class="card card-box">

<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="title">Patient Registration</h3>
  <a href="/"><button class="btn btn-light">🏠 Home</button></a>
</div>

<p>Create your patient account to continue.</p>

<div class="row">

<div class="col-md-6">
<label>Full Name</label>
<input v-model="name" class="form-control">
</div>

<div class="col-md-6">
<label>Email</label>
<input v-model="email" class="form-control">
</div>

<div class="col-md-6 mt-3">
<label>Password</label>
<input type="password" v-model="password" class="form-control">
</div>

<div class="col-md-6 mt-3">
<label>Contact</label>
<input v-model="phone" class="form-control">
</div>

<div class="col-md-6 mt-3">
<label>Date of Birth</label>
<input type="date" v-model="dob" class="form-control">
</div>

<div class="col-md-6 mt-3">
<label>Gender</label>
<select v-model="gender" class="form-control">
  <option disabled value="">Select</option>
  <option>Male</option>
  <option>Female</option>
</select>
</div>

<div class="col-md-12 mt-3">
<label>Address</label>
<textarea v-model="address" class="form-control"></textarea>
</div>

</div>

<button class="btn btn-green w-100 mt-4" @click="register">
Register
</button>

<p class="text-center mt-3">
Already have an account?
<a href="/login/patient">Login</a>
</p>

</div>

<script src="/static/js/register.js"></script>
<script src="/static/js/toast.js"></script>

</body>
</html>
