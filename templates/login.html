<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f5f7fa;
}

/* SAME WIDTH AS REGISTER */
.form-wrapper{
  width:100%;
  max-width:500px;
  margin:80px auto;
}

.card-box{
  padding:40px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  background:white;
}

.title{
  color:#0d6efd;
  font-weight:600;
}

.btn-primary{
  font-size:18px;
}
</style>

</head>

<body>

<div id="app" class="form-wrapper">

<div class="card-box">

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="title">Login [[role]]</h2>
  <a href="/"><button class="btn btn-outline-secondary">🏠 Home</button></a>
</div>

<p class="mb-4">Welcome back! Please login to continue.</p>

<div class="row g-4">

<div class="col-md-12">
<label class="form-label">Username</label>
<input v-model="username" class="form-control form-control-lg">
</div>

<div class="col-md-12">
<label class="form-label">Password</label>
<input type="password" v-model="password" class="form-control form-control-lg">
</div>

</div>

<button class="btn btn-primary w-100 mt-4 py-2" @click="login">
Login
</button>

<p class="text-center mt-3" v-if="role=='patient'">
New user?
<a :href="'/register/'+role">Register</a>
</p>

</div>

</div>

<script src="/static/js/login.js"></script>
<script src="/static/js/toast.js"></script>

</body>
</html>
